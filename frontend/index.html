<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill Splitter App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>💸 Bill Splitter</h1>

        <!-- Add Person Section -->
        <div class="card">
            <h2>👤 Add Person</h2>
            <input type="text" id="personName" placeholder="Enter name" />
            <input type="text" id="personEmail" placeholder="Enter email (optional)" />
            <button onclick="addPerson()">Add Person</button>
        </div>

        <!-- People List -->
        <div class="card">
            <h2>👥 People</h2>
            <ul id="personList"></ul>
        </div>

        <!-- Add Expense Section -->
        <div class="card">
            <h2>💰 Add Expense</h2>
            <input type="text" id="expenseDesc" placeholder="Description (e.g. Dinner)" />
            <input type="number" id="expenseAmount" placeholder="Amount (e.g. 500)" />
            <select id="paidBy">
                <option value="">-- Who Paid? --</option>
            </select>
            <button onclick="addExpense()">Add Expense</button>
        </div>

        <!-- Expense List -->
        <div class="card">
            <h2>🧾 Expenses</h2>
            <ul id="expenseList"></ul>
        </div>

        <!-- Split Result -->
        <div class="card">
            <h2>📊 Split Summary</h2>
            <button onclick="calculateSplit()">Calculate Split</button>
            <div id="splitResult"></div>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
